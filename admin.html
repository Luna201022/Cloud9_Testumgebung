<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cloud9 Admin – Menü</title>
  <style>
    :root{
      --bg:#0b1117; --panel:#0f1720; --border:#263341; --text:#e6edf3;
      --muted:#9fb0c0; --ok:#3fb950; --bad:#f85149; --btn:#152131;
    }
    *{ box-sizing:border-box; }
    body{ margin:0; font-family:system-ui, Arial, sans-serif; background:var(--bg); color:var(--text); }
    header{ padding:16px; border-bottom:1px solid var(--border); display:flex; gap:12px; align-items:center; flex-wrap:wrap;}
    header h1{ font-size:18px; margin:0; }
    .pin{ display:flex; gap:8px; align-items:center; }
    input, button, select, textarea{
      background:var(--panel); color:var(--text);
      border:1px solid var(--border); border-radius:8px; padding:10px;
    }
    button{ background:var(--btn); cursor:pointer; }
    button:hover{ filter:brightness(1.1); }
    .status{ margin-left:auto; font-size:14px; color:var(--muted); }
    .status.ok{ color:var(--ok); }
    .status.bad{ color:var(--bad); }

    main{ display:grid; grid-template-columns: 260px 1fr; gap:12px; padding:12px; }
    .card{ background:var(--panel); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
    .card h2{ font-size:14px; margin:0; padding:12px; border-bottom:1px solid var(--border); color:var(--muted); }
    .list{ padding:8px; display:flex; flex-direction:column; gap:8px; }
    .cat{ padding:10px; border:1px solid var(--border); border-radius:10px; cursor:pointer; display:flex; justify-content:space-between; gap:8px; }
    .cat.active{ outline:2px solid #2b6cb0; }
    .cat small{ color:var(--muted); }
    .toolbar{ padding:12px; border-bottom:1px solid var(--border); display:flex; gap:8px; flex-wrap:wrap;}
    table{ width:100%; border-collapse:collapse; }
    th, td{ padding:10px; border-bottom:1px solid var(--border); vertical-align:middle; }
    th{ text-align:left; color:var(--muted); font-weight:600; font-size:13px; }
    td input[type="text"], td input[type="number"]{ width:100%; }
    .actions{ display:flex; gap:8px; }
    .right{ display:flex; gap:8px; margin-left:auto; }
    .danger{ border-color:#5a1f1f; }
    .danger:hover{ filter:brightness(1.15); }
    .muted{ color:var(--muted); }

    @media (max-width: 900px){
      main{ grid-template-columns: 1fr; }
      .status{ width:100%; margin-left:0; }
    }
  </style>
</head>
<body>
<header>
  <h1>Cloud9 Admin – Menü</h1>

  <div class="pin">
    <input id="pin" type="password" placeholder="ADMIN PIN" />
    <button id="btnLoad">Laden</button>
    <button id="btnSave">Speichern</button>
  </div>

  <div class="status" id="status">Bereit</div>
</header>

<main>
  <section class="card">
    <h2>Kategorien</h2>
    <div class="toolbar">
      <button id="btnAddCat">+ Kategorie</button>
    </div>
    <div class="list" id="catList"></div>
  </section>

  <section class="card">
    <h2 id="itemsTitle">Artikel</h2>
    <div class="toolbar">
      <div class="muted" id="hint">Lade zuerst das Menü.</div>
      <div class="right">
        <button id="btnAddItem">+ Artikel</button>
        <button id="btnDelCat" class="danger">Kategorie löschen</button>
      </div>
    </div>

    <div style="overflow:auto;">
      <table id="itemsTable">
        <thead>
          <tr>
            <th style="width:22%;">ID</th>
            <th style="width:28%;">Name</th>
            <th>Beschreibung</th>
            <th style="width:12%;">Preis (€)</th>
            <th style="width:10%;">Aktiv</th>
            <th style="width:10%;">Aktion</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </section>
</main>

<script>
  const api = "/api/menu";
  const statusEl = document.getElementById("status");
  const pinEl = document.getElementById("pin");
  const catListEl = document.getElementById("catList");
  const itemsTitleEl = document.getElementById("itemsTitle");
  const hintEl = document.getElementById("hint");
  const tbody = document.querySelector("#itemsTable tbody");

  let menu = null;
  let activeCatIndex = -1;

  function setStatus(msg, kind=""){
    statusEl.textContent = msg;
    statusEl.className = "status" + (kind ? " " + kind : "");
  }

  function bearer(){
    const pin = pinEl.value.trim();
    if(!pin) throw new Error("PIN fehlt");
    return "Bearer " + pin;
  }

  function euro(n){
    const v = Number(n);
    return Number.isFinite(v) ? v : 0;
  }

  function slug(s){
    return (s || "")
      .toLowerCase()
      .trim()
      .replace(/[^\wäöüß]+/g, "_")
      .replace(/_+/g, "_")
      .replace(/^_|_$/g, "");
  }

  function renderCats(){
    catListEl.innerHTML = "";
    if(!menu?.categories?.length){
      catListEl.innerHTML = `<div class="muted" style="padding:12px;">Keine Kategorien</div>`;
      return;
    }

    menu.categories.forEach((c, idx) => {
      const el = document.createElement("div");
      el.className = "cat" + (idx===activeCatIndex ? " active" : "");
      el.innerHTML = `
        <div>
          <div><strong>${escapeHtml(c.title || "(ohne Titel)")}</strong></div>
          <small>${escapeHtml(c.id || "")} • ${c.items?.length || 0} Artikel</small>
        </div>
        <div class="muted">›</div>
      `;
      el.onclick = () => { activeCatIndex = idx; renderAll(); };
      catListEl.appendChild(el);
    });
  }

  function renderItems(){
    tbody.innerHTML = "";
    hintEl.textContent = menu ? "" : "Lade zuerst das Menü.";
    if(activeCatIndex < 0 || !menu?.categories?.[activeCatIndex]){
      itemsTitleEl.textContent = "Artikel";
      return;
    }

    const cat = menu.categories[activeCatIndex];
    itemsTitleEl.textContent = `Artikel – ${cat.title || cat.id || ""}`;

    (cat.items || []).forEach((it, idx) => {
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td><input type="text" value="${escapeAttr(it.id || "")}" data-k="id" data-i="${idx}"></td>
        <td><input type="text" value="${escapeAttr(it.name || "")}" data-k="name" data-i="${idx}"></td>
        <td><input type="text" value="${escapeAttr(it.desc || "")}" data-k="desc" data-i="${idx}"></td>
        <td><input type="number" step="0.10" min="0" value="${escapeAttr(euro(it.price))}" data-k="price" data-i="${idx}"></td>
        <td style="text-align:center;"><input type="checkbox" ${it.active===false ? "" : "checked"} data-k="active" data-i="${idx}"></td>
        <td><button class="danger" data-del="${idx}">Löschen</button></td>
      `;

      tbody.appendChild(tr);
    });

    // Änderungen
    tbody.querySelectorAll("input").forEach(inp => {
      inp.addEventListener("input", onItemChange);
      inp.addEventListener("change", onItemChange);
    });

    // Löschen
    tbody.querySelectorAll("button[data-del]").forEach(btn => {
      btn.onclick = () => {
        const i = Number(btn.getAttribute("data-del"));
        const cat = menu.categories[activeCatIndex];
        cat.items.splice(i, 1);
        renderItems();
      };
    });
  }

  function onItemChange(e){
    const inp = e.target;
    const idx = Number(inp.getAttribute("data-i"));
    const key = inp.getAttribute("data-k");
    const cat = menu.categories[activeCatIndex];
    const it = cat.items[idx];

    if(key === "price"){
      it.price = euro(inp.value);
    } else if(key === "active"){
      it.active = inp.checked;
    } else {
      it[key] = inp.value;
    }
  }

  function renderAll(){
    renderCats();
    renderItems();
  }

  async function loadMenu(){
    try{
      setStatus("Lade Menü...");
      const res = await fetch(api, { headers: { "Authorization": bearer() }});
      if(!res.ok) return setStatus("Fehler beim Laden: " + res.status, "bad");
      const txt = await res.text();

      menu = txt && txt !== "null" ? JSON.parse(txt) : { categories: [] };
      if(!menu.categories) menu.categories = [];
      activeCatIndex = menu.categories.length ? 0 : -1;

      renderAll();
      setStatus("Menü geladen", "ok");
    }catch(err){
      setStatus(err.message || String(err), "bad");
    }
  }

  async function saveMenu(){
    try{
      if(!menu) throw new Error("Nichts geladen");
      setStatus("Speichere...");
      const body = JSON.stringify(menu, null, 2);

      const res = await fetch(api, {
        method:"PUT",
        headers:{
          "Authorization": bearer(),
          "Content-Type":"application/json; charset=utf-8"
        },
        body
      });
      if(!res.ok) return setStatus("Fehler beim Speichern: " + res.status, "bad");
      setStatus("Gespeichert ✔", "ok");
    }catch(err){
      setStatus(err.message || String(err), "show");
      setStatus(err.message || String(err), "bad");
    }
  }

  function addCategory(){
    if(!menu) return setStatus("Erst laden", "bad");
    const title = prompt("Kategorie-Titel?");
    if(!title) return;
    const id = slug(title) || ("cat_" + Date.now());
    menu.categories.push({ id, title, items: [] });
    activeCatIndex = menu.categories.length - 1;
    renderAll();
  }

  function deleteCategory(){
    if(activeCatIndex < 0) return;
    const cat = menu.categories[activeCatIndex];
    if(!confirm(`Kategorie "${cat.title || cat.id}" wirklich löschen?`)) return;
    menu.categories.splice(activeCatIndex, 1);
    activeCatIndex = menu.categories.length ? 0 : -1;
    renderAll();
  }

  function addItem(){
    if(activeCatIndex < 0) return setStatus("Wähle eine Kategorie", "bad");
    const cat = menu.categories[activeCatIndex];
    const name = prompt("Artikel-Name?");
    if(!name) return;
    const id = slug(name) || ("item_" + Date.now());
    cat.items.push({ id, name, desc:"", price:0, active:true });
    renderItems();
  }

  function escapeHtml(s){
    return String(s ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }
  function escapeAttr(s){ return escapeHtml(s).replace(/\n/g, " "); }

  document.getElementById("btnLoad").onclick = loadMenu;
  document.getElementById("btnSave").onclick = saveMenu;
  document.getElementById("btnAddCat").onclick = addCategory;
  document.getElementById("btnDelCat").onclick = deleteCategory;
  document.getElementById("btnAddItem").onclick = addItem;
</script>
</body>
</html>
